      targetPosition: left
      type: custom
      width: 243
    - data:
        code: "import json\nimport re\n\ndef extract_json(text: str) -> str:\n   \
          \ \"\"\"从 LLM 输出中提取 JSON（支持嵌套对象）\"\"\"\n    text = text.strip()\n    # 去掉\
          \ markdown 代码块\n    text = re.sub(r'```(?:json)?\\s*', '', text)\n    text\
          \ = re.sub(r'\\s*```', '', text)\n    # 找到第一个 { 和对应的 }\n    start = text.find('{')\n\
          \    if start == -1:\n        return ''\n    depth = 0\n    for i in range(start,\
          \ len(text)):\n        if text[i] == '{':\n            depth += 1\n    \
          \    elif text[i] == '}':\n            depth -= 1\n            if depth\
          \ == 0:\n                return text[start:i + 1]\n    return ''\n\ndef\
          \ main(llm_output: str) -> dict:\n    json_str = extract_json(llm_output)\n\
          \    if not json_str:\n        return {\"decision\": \"review\", \"confidence\"\
          : 0.5, \"reasoning\": \"LLM 输出中未找到 JSON\", \"signals\": {}}\n    try:\n\
          \        result = json.loads(json_str)\n    except json.JSONDecodeError:\n\
          \        return {\"decision\": \"review\", \"confidence\": 0.5, \"reasoning\"\
          : \"JSON 解析失败: \" + json_str[:100], \"signals\": {}}\n    decision = result.get(\"\
          decision\", \"review\")\n    if decision not in (\"merge\", \"review\",\
          \ \"no_match\"):\n        decision = \"review\"\n    return {\n        \"\
          decision\": decision,\n        \"confidence\": round(float(result.get(\"\
          confidence\", 0.5)), 4),\n        \"reasoning\": str(result.get(\"reasoning\"\
          , \"\")),\n        \"signals\": result.get(\"signals\", {})\n    }\n"
        code_language: python3
        desc: 解析 LLM 输出的 JSON 字符串，提取决策、置信度和理由。
        outputs:
          confidence:
            children: null
            type: number
          decision:
            children: null
            type: string
          reasoning:
            children: null
            type: string
          signals:
            children: null
            type: object
        selected: false
        title: 解析 JSON
        type: code
        variables:
        - value_selector:
          - '1000000000002'
          - text
          variable: llm_output
