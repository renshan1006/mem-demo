    - data:
        context:
          enabled: false
          variable_selector: []
        desc: LLM 根据客户/商品规则判断两条记录是否为同一实体。
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: deepseek-v4-flash
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          role: system
          text: '你是一个主数据管理（MDM）专家，负责判断两个业务系统中的记录是否为同一实体。


            ## 客户匹配规则（按优先级）：

            1. 税号一致 → 高度确定为同一实体

            2. 电话（去格式）一致 → 强信号

            3. 公司名语义匹配：处理中英文混用、后缀差异、地名变体

            4. 同地址/同城 > 异地

            5. 跨省同名大概率不同实体（分公司除外）


            ## 商品匹配规则（按优先级）：

            1. SKU 非空且一致 → 同一商品；SKU 都有值但不同 → 不同商品变体

            2. UPC 条码一致 → 同一商品；条码都非空但不同 → 不同商品

            3. 商品名语义匹配 + 品牌/型号联合判断

            4. 跨品类不可能是同一商品


            ## 决策阈值：

            - confidence >= 0.85 → merge（自动合并）

            - confidence 0.65-0.84 → review（人工审核）

            - confidence < 0.65 → no_match（不同实体）


            ## 输出格式（严格 JSON，不要包含 ``` 代码块标记）：

            {"decision":"merge|review|no_match","confidence":0.85,"reasoning":"简短推理","signals":{"tax_id_match":false,"phone_match":false,"sku_match":false,"upc_match":false,"name_semantic_similarity":0.9,"same_region_or_category":true}}

            '
        - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
          role: user
          text: '请判断以下两条 {{#1000000000001.entity_type#}} 记录是否为同一实体。


            【记录 A - {{#1000000000001.source_a#}}】

            {% if #1000000000001.entity_type# == "customer" %}

            - 公司名称：{{#1000000000001.company_name_a#}}

            - 地区：{{#1000000000001.region_a#}}

            - 城市：{{#1000000000001.city_a#}}

            - 地址：{{#1000000000001.address_a#}}

            - 电话：{{#1000000000001.phone_a#}}

            - 税号：{{#1000000000001.tax_id_a#}}

            {% else %}

            - 商品名：{{#1000000000001.product_name_a#}}

            - 品类：{{#1000000000001.category_a#}}

            - 品牌：{{#1000000000001.brand_a#}}

            - 型号：{{#1000000000001.model_a#}}

            - SKU：{{#1000000000001.sku_a#}}

            - 规格：{{#1000000000001.specification_a#}}

            - 条码：{{#1000000000001.upc_a#}}

            {% endif %}


            【记录 B - {{#1000000000001.source_b#}}】

            {% if #1000000000001.entity_type# == "customer" %}

            - 公司名称：{{#1000000000001.company_name_b#}}

            - 地区：{{#1000000000001.region_b#}}

            - 城市：{{#1000000000001.city_b#}}

            - 地址：{{#1000000000001.address_b#}}

            - 电话：{{#1000000000001.phone_b#}}

            - 税号：{{#1000000000001.tax_id_b#}}

            {% else %}

            - 商品名：{{#1000000000001.product_name_b#}}

            - 品类：{{#1000000000001.category_b#}}

            - 品牌：{{#1000000000001.brand_b#}}

            - 型号：{{#1000000000001.model_b#}}

            - SKU：{{#1000000000001.sku_b#}}

            - 规格：{{#1000000000001.specification_b#}}

            - 条码：{{#1000000000001.upc_b#}}

            {% endif %}


            请按照系统提示的规则判断并输出 JSON。

            '
        selected: false
        title: LLM 语义匹配
        type: llm
        vision:
          enabled: false
      height: 133
      id: '1000000000002'
      position:
        x: 405
        y: 200
      positionAbsolute:
        x: 405
        y: 200
      selected: true
