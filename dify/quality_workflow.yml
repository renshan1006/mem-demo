    - data:
        code: |
          import json
          import re

          def extract_json(text: str) -> str:
              """从 LLM 输出中提取 JSON（支持嵌套对象）"""
              text = text.strip()
              text = re.sub(r'```(?:json)?\s*', '', text)
              text = re.sub(r'\s*```', '', text)
              start = text.find('{')
              if start == -1:
                  return ''
              depth = 0
              for i in range(start, len(text)):
                  if text[i] == '{':
                      depth += 1
                  elif text[i] == '}':
                      depth -= 1
                      if depth == 0:
                          return text[start:i + 1]
              return ''

          def main(llm_output: str) -> dict:
              json_str = extract_json(llm_output)
              if not json_str:
                  return {
                      "补全建议": "LLM 输出中未找到 JSON",
                      "去重建议": "",
                      "异常原因": "",
                      "整改优先级": [],
                      "总结": "",
                  }
              try:
                  result = json.loads(json_str)
              except json.JSONDecodeError:
                  return {
                      "补全建议": "JSON 解析失败: " + json_str[:100],
                      "去重建议": "",
                      "异常原因": "",
                      "整改优先级": [],
                      "总结": "",
                  }
              prio = result.get("整改优先级", [])
              if not isinstance(prio, list):
                  prio = [str(prio)]
              return {
                  "补全建议": str(result.get("补全建议", "")),
                  "去重建议": str(result.get("去重建议", "")),
                  "异常原因": str(result.get("异常原因", "")),
                  "整改优先级": [str(x) for x in prio],
                  "总结": str(result.get("总结", "")),
              }
        code_language: python3
        desc: 解析 LLM 输出的 JSON，提取补全建议/去重建议/异常原因/整改优先级/总结。
        outputs:
          补全建议:
            children: null
            type: string
          去重建议:
            children: null
            type: string
          异常原因:
            children: null
            type: string
          整改优先级:
            children: null
            type: array[string]
          总结:
            children: null
            type: string
        selected: false
        title: 解析 JSON
        type: code
        variables:
